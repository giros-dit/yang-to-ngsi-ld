        - type: object
          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be NetworkInstanceConnectionPointPseudowire.
              type: string
              enum:
                - NetworkInstanceConnectionPointPseudowire
              default: NetworkInstanceConnectionPointPseudowire
            name:
              $ref: '#/components/schemas/NetworkInstanceConnectionPointPseudowireName'
            adminState:
              $ref: '#/components/schemas/NetworkInstanceConnectionPointPseudowireAdminState'
            operState:
              $ref: '#/components/schemas/NetworkInstanceConnectionPointPseudowireOperState'
            operDownReason:
