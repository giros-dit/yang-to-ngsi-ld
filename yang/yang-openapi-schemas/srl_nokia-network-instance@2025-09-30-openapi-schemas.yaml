          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be SystemLldpInterfaceStatistics.
              type: string
              enum:
                - SystemLldpInterfaceStatistics
              default: SystemLldpInterfaceStatistics
            frameIn:
              $ref: '#/components/schemas/SystemLldpInterfaceStatisticsFrameIn'
            frameOut:
              $ref: '#/components/schemas/SystemLldpInterfaceStatisticsFrameOut'
            frameErrorIn:
              $ref: '#/components/schemas/SystemLldpInterfaceStatisticsFrameErrorIn'
            frameDiscard:
              $ref: '#/components/schemas/SystemLldpInterfaceStatisticsFrameDiscard'
            tlvDiscard:
              $ref: '#/components/schemas/SystemLldpInterfaceStatisticsTlvDiscard'
            tlvUnknown:
              $ref: '#/components/schemas/SystemLldpInterfaceStatisticsTlvUnknown'
            lastClear:
              $ref: '#/components/schemas/SystemLldpInterfaceStatisticsLastClear'
            frameErrorOut:
              $ref: '#/components/schemas/FrameErrorOut'
            isPartOf:
              $ref: '#/components/schemas/IsPartOf'
              description: isPartOf Relationship with Entity type SystemLldpInterface.
