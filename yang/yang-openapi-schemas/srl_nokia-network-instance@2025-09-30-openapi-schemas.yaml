openapi: 3.0.3
info:
  title: OpenAPI schemas for YANG data models ietf-yang-types@2013-07-15.yang, srl_nokia-bridge-table-mac-duplication.yang, srl_nokia-bridge-table-mac-learning.yang, srl_nokia-bridge-table-mac-limit.yang, srl_nokia-bridge-table-shg.yang, srl_nokia-bridge-table.yang, srl_nokia-common.yang, srl_nokia-connection-point-pseudowires.yang, srl_nokia-extensions.yang, srl_nokia-features.yang, srl_nokia-flexible-algorithms-types.yang, srl_nokia-icmp.yang, srl_nokia-if-ip.yang, srl_nokia-interfaces-bridge-table.yang, srl_nokia-interfaces.yang, srl_nokia-ip-route-tables.yang, srl_nokia-isis-lsdb-types.yang, srl_nokia-isis-lsdb.yang, srl_nokia-isis-types.yang, srl_nokia-keychains.yang, srl_nokia-linux@2019-11-30.yang, srl_nokia-lldp-types.yang, srl_nokia-lldp.yang, srl_nokia-load-balancing.yang, srl_nokia-network-instance.yang, srl_nokia-next-hop-groups.yang, srl_nokia-ospf@2020-12-31.yang, srl_nokia-ospf-lsdb.yang, srl_nokia-ospf-types.yang, srl_nokia-ospfv3-lsas.yang, srl_nokia-platform-control-fp.yang, srl_nokia-platform-control.yang, srl_nokia-platform-lc.yang, srl_nokia-platform-linecard-fib.yang, srl_nokia-platform-pipeline-counters.yang, srl_nokia-platform.yang, srl_nokia-policy-types.yang, srl_nokia-protection-policies.yang, srl_nokia-pw-tunnel.yang, srl_nokia-routing-policy.yang, srl_nokia-srv6-types.yang, srl_nokia-srv6.yang, srl_nokia-static-routes@2019-11-30.yang, srl_nokia-system.yang, srl_nokia-traffic-engineering.yang, srl_nokia-tunnel.yang.
  version: 1.0.0
  description: OpenAPI schemas for YANG data models compliant with the NGSI-LD OAS V1.6.1 metamodel according to ETSI GS CIM 009 V1.6.1.
paths: {}
components:
  schemas:
    Interface:
      description: |
        The list of named interfaces on the device
        
        YANG module: srl_nokia-interfaces.yang
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Entity'
        - type: object
          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be Interface.
              type: string
              enum:
                - Interface
              default: Interface
            name:
              $ref: '#/components/schemas/InterfaceName'
            description:
              $ref: '#/components/schemas/InterfaceDescription'
            adminState:
              $ref: '#/components/schemas/InterfaceAdminState'
            numPhysicalChannels:
              $ref: '#/components/schemas/NumPhysicalChannels'
            mtu:
              $ref: '#/components/schemas/InterfaceMtu'
            swapSrcDstMac:
              $ref: '#/components/schemas/SwapSrcDstMac'
            ifindex:
              $ref: '#/components/schemas/InterfaceIfindex'
            operState:
              $ref: '#/components/schemas/InterfaceOperState'
            operDownReason:
              $ref: '#/components/schemas/InterfaceOperDownReason'
            lastChange:
              $ref: '#/components/schemas/InterfaceLastChange'
            linecard:
              $ref: '#/components/schemas/InterfaceLinecard'
            forwardingComplex:
              $ref: '#/components/schemas/InterfaceForwardingComplex'
            phyGroupMembers:
              $ref: '#/components/schemas/PhyGroupMembers'
            physicalChannel:
              $ref: '#/components/schemas/PhysicalChannel'
            forwardingMode:
              $ref: '#/components/schemas/ForwardingMode'
        - required:
          - type
          - name
    InterfaceName:
      description: |
        The name of the interface
        
        Valid options are:
        irb<N>, N=0..255
        lif-<lif_name>
        enp<bus>s<dev>f<fn>, bus=0..255, dev=0..31, fn=0..7
        vhn-<vhn_name>
        lag<N>, N=1..1000 [note1]
        lo<N>, N=0..255
        mgmt0
        mgmt0-standby
        mgmtA
        mgmtB
        ethernet-<slot>/<port>
        ethernet-<slot>/<connector>/<port>
        ethernet-<slot>/m<mda>/<port>
        ethernet-<slot>/m<mda>/<connector>/<port>
        system0
        sync0
        
        <lif_name>=Linux interface name
        <vhn_name>=vhost interface name
        <slot>=slot number {1,2,3,..}
        <mda>=mda id {1,2,3,..}
        <connector>=connector id {1,2,3,..}
        <port>=port id {1,2,3,..}
        
        [note1] The maximum number of LAGs per platform is as follows:
         D1: 32 (N must be 1..32)
         D2-D3: 128 (N must be 1..1000)
         D4-D5: 64 (N must be 1..64)
         H2-H3: 127 (N must be 1..127)
         H4-32D: 127 (N must be 1..127)
         H4: 255 (N must be 1..255)
         H5-32D: 127 (N must be 1..127)
         H5-64D: 127 (N must be 1..127)
         H5-64O: 127 (N must be 1..127)
         IXR: 512 (N must be 1..512)
         SXR-1d-32D: 128 (N must be 1..128)
         SXR-1x-44S: 128 (N must be 1..128)
         vSRL: 8 (N must be 1..8)
         A1: 10 (N must be 1..10)
         IXR-X1b: 512 (N must be 1..512)
         IXR-X3b: 512 (N must be 1..512)
         SSE-T8164: 127 (N must be 1..127)
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              pattern: '(mgmt0|mgmt0-standby|mgmtA|mgmtB|system0|sync0|lo(0|1[0-9][0-9]|2([0-4][0-9]|5[0-5])|[1-9][0-9]|[1-9])|lif-.*|vhn-.*|enp(0|1[0-9][0-9]|2([0-4][0-9]|5[0-5])|[1-9][0-9]|[1-9])s(0|[1-9]|[1-2][0-9]|3[0-1])f[0-7]|ethernet-([1-9](\d){0,1}(/m[1-6])?(/[1-9](\d){0,1})?/(([1-9](\d){0,1})|(1[0-1]\d)|(12[0-8])))|irb(0|1[0-9][0-9]|2([0-4][0-9]|5[0-5])|[1-9][0-9]|[1-9])|lag(([1-9](\d){0,2})|(1000)))'
          required:
            - value
    InterfaceDescription:
      description: |
        A user-configured description of the interface
        
        Reference: RFC 2863: The Interfaces Group MIB - ifAlias
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
          required:
            - value
    InterfaceAdminState:
      description: |
        The configured, desired state of the interface
        
        For digital coherent optic transceivers, when the interface associated to the transceiver is set to disable, the transceiver is placed into low power mode, if that function is supported.
        
        Reference: RFC 2863: The Interfaces Group MIB - ifAdminStatus
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - enable
                - disable
              default: enable
          required:
            - value
    NumPhysicalChannels:
      description: |
        Sets the number of lanes or physical channels assigned to this interface or to the set of interfaces within this breakout group
        
        This leaf can be used to distinguish between transceivers that provide the same port-speed or breakout-configuration but using different PMAs.
        For example, if a port supports two transceivers providing 100G optical signal but one uses CAUI4 and the other uses 100GAUI-2, then this leaf
        can be set to 4 for the CAUI4 transceiver and 2 for the 100GAUI-2 transceiver.
        Similarly, a transceiver that provides a breakout of 4 ports of 100G using 4 x 100GAUI2 would set this leaf to 8 but a transceiver using 4 x 100GAUI-1 would have this leaf set to 4.
        
        If not set, then the default shall be as follows:
          1 is used for 10G, 25G
          2 is used for 50G
          4 is used for 40G, 100G, 2x50G, 1x100G, 4x10G, 4x25G
          6 is used for 3x100G (digital coherent optics)
          8 is used for 200G, 400G, 800G, 2x100G, 4x100G, 8x50G
        
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
              minimum: 1
              maximum: 8
          required:
            - value
    InterfaceBreakoutMode:
      description: |
        Configuration of breakout options.
        
        7220 D2L ports 49-55: 4x10G
        7220 D3 ports 3-33: 4x10G and 4x25G
        7220 D3L ports 1-31: 2x50G, 4x10G and 4x25G
        7220 H3 ports 3-34: 4x10G, 2x100G/4x100G, and 2x200G
        7220 H4 ports 1-64: 4x100G and 2x200G
        7220 H4-32D ports 1-32: 2x100G/4x100G and 2x200G
        7220 H5-32D Odd Ports 1-31: 2x100G/4x100G/8x100G and 2x400G
        7220 H5-32D Even Ports 2-32: 2x100G, 2x400G
        7220 H5-64D ports 1-32: 2x100G/4x100G/8x100G and 2x400G
        7220 H5-64D ports 33-64: 2x100G and 2x400G
        7220 H5-64O ports 1-32: 8x100G and 2x400G
        7220 H5-64O ports 33-64: 2x400G
        7220 D4 ports 29-32: 4x100G, 4x25G, and 4x10G
        7220 D4 ports 9, 23-27: 4x25G and 4x10G
        7220 D5 ports 1-32: 4x10G, 4x25G, 2x100G/4x100G, and 2x200G
        7730 SXR-1d-32D QSFP28 ports 1-16, 21-32: 4x10G and 4x25G (Note 3)
        7730 SXR-1d-32D QSFPDD ports 17-20: 4x100G, 3x100G (Note 1), 4x25G, and 4x10G
        7730 SXR-1x-44S SFPDD ports 1-20, 23-42: No breakouts
        7730 SXR-1x-44S QSFPDD ports 21,22,43,44: 4x100G, 3x100G (Note 1), 4x25G, and 4x10G
        7250 IXR-6e/10e 60p QSFP28 IMM ports: 9,12,15,18,21,24,26,27,29,30,32,33,35,36,38,39,41,42,45,48: 4x25G and 4x10G (Note 2)
        7250 IXR-6e/10e 36p QSFPDD IMM all ports: 4x100G, 2x100G, 4x25G, and 4x10G
        7250 IXR-6e/10e/18e 36p QSFP112-DD IMM all ports: 2x400G, 8x100G, 4x100G, 3x100G (Note 1), 2x100G, 1x100G (Note 1), 4x25G
        7250 IXR-6e/10e/18e 36p OSFP IMM all ports: 2x400G, 8x100G
        7250 IXR-X1b QSFP28 ports 1-24: 4x25G, and 4x10G (Note 4)
        7250 IXR-X1b QSFPDD ports 25-36: 4x100G, 3x100G (Note 1), 2x100G (Note 1), 1x100G (Note 1), 4x25G, and 4x10G
        7250 IXR-X3b QSFPDD all ports: 4x100G, 3x100G (Note 1), 2x100G (Note 1), 1x100G (Note 1), 4x25G, and 4x10G
        SSE-T8164 Odd Ports 1-63: 2x400G, 4x200G, 8x100G
        SSE-T8164 Even Ports 2-64: 2x400G
        
        Note 1: 3x100G, 2x100G, 1x100G is only supported for Digital Coherent Optic transceivers
        
        Note 2: For the following port groupings only the higher numbered port supports breakout-mode.
            If the higher numbered port is to be configured for breakout-mode, then the lower numbered port should not be configured.
            If both ports are configured, then the lower numbered port takes precedence and the higher numbered port shall be operationally down with reason unsupported-breakout-port.
            Groupings are (8,9), (11,12), (14,15), (17,18), (20,21), (23,24), (44, 45), (47,48).
        
        Note 3: Breakout and 40G is only supported on odd numbered ports.
            For the QSFP28 four port groupings [1-4], [5-8], [9-12], [13-16], [21-24], [25-28], and [29-32] if either of the odd numbered ports within a group is configured for 40G, 4x10G, or 4x25G,
            then the other odd numbered port in the same group may only be configured if it is configured for one of 40G, 4x10G, or 4x25G (can differ between the odd ports) and neither of
            the two even numbered ports within the same group can be configured.
        
        Note 4: For the QSFP28 ports, the following port groups exist [n, n+1, n+2, n+3] for n = 1, 5, 9, 13, 17, 21. Breakout for 4x25G or 4x10G is only supported on ports n+1 and n+3.
            When initially configuring a port with a breakout configuration or port speed that does not already exist on another configured port within the same group, then a link flap and traffic hit may occur on other ports within the same group.
            When the breakout configuration or port speed is changed for a port in a group, then a link flap and traffic hit may occur on other ports within the same group.
            If port n+1 within the group is configured for breakout, then port n cannot be configured.
            In addition if port n+1 is configured for breakout and port n+3 is configured without breakout, then port n+2 may only be configured with the same speed as port n+3.
            If port n+3 within the group is configured for breakout, then port n+2 cannot be configured.
            In addition if port n+3 is configured for breakout and port n+1 is configured without breakout, then port n may only be configured with the same speed as port n+1.
        
        Port Groups and auto-configuration of port speed:
         Manually configured breakout-mode takes precedence over the auto-configured port-speed. This means that configuring a port within a port-group can have a side effect to take down an operational port that had its speed set based on the auto configuration feature. If there is risk of mixing transceiver types within a port group, then it is recommended to always manually configure the ports
        
        YANG module: srl_nokia-interfaces.yang
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Entity'
        - type: object
          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be InterfaceBreakoutMode.
              type: string
              enum:
                - InterfaceBreakoutMode
              default: InterfaceBreakoutMode
            numBreakoutPorts:
              $ref: '#/components/schemas/NumBreakoutPorts'
            breakoutPortSpeed:
              $ref: '#/components/schemas/BreakoutPortSpeed'
            isPartOf:
              $ref: '#/components/schemas/IsPartOf'
              description: isPartOf Relationship with Entity type Interface.
        - required:
          - type
          - isPartOf
          - numBreakoutPorts
          - breakoutPortSpeed
    NumBreakoutPorts:
      description: |
        The number of breakout ports supported by this connector
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - 1
                - 2
                - 3
                - 4
                - 8
          required:
            - value
    BreakoutPortSpeed:
      description: |
        The speed of each breakout port
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - 1G
                - 10G
                - 25G
                - 50G
                - 100G
                - 200G
                - 400G
          required:
            - value
    InterfaceMtu:
      description: |
        Port MTU in bytes including ethernet overhead but excluding 4-bytes FCS
        
        If a transmitted packet exceeds this size it is dropped.
        The default value for ethernet-x interfaces is taken from /system/mtu/default-port-mtu. For the mgmt0 and mgmt0-standby interfaces the default is 1514 bytes, but the value can be changed for each interface individually. For the mgmtA and mgmtB interfaces the default value is derived from mgmt0 or mgmt0-standby configuration.
        Port MTU is not configurable for loopback interfaces or irb interfaces. For irb interfaces, if the size of the ip packets to be routed to a mac-vrf has to be restricted, the subinterface.ip-mtu should be configured instead.
        The max mtu for the mgmt0, mgmt0-standby, mgmtA and mgmtB interfaces is 9216.
        The 7220 IXR systems support a maximum port MTU of 9412 bytes and minimum of 1500 bytes.
        The VSRL system supports a maximum port MTU of 9500 and minimum of 1450 bytes.
        The 7730 SXR systems support a maximum port MTU of 9408 bytes and minimum of 1500 bytes.
        All other systems support a maximum port MTU of 9500 and minimum of 1500 bytes.
        Each 7250 IXR IMM supports a maximum of 8 different port MTU values. 7220 IXR systems do not have any limit on the maximum number of different port MTU values.
        
        Units: bytes
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
              minimum: 1450
              maximum: 9500
          required:
            - value
    SwapSrcDstMac:
      description: |
        Enable swapping source and destination MAC addresses
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: boolean
              default: false
          required:
            - value
    InterfaceIfindex:
      description: |
        System-wide persistent unique ifIndex assigned to the interface
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceOperState:
      description: |
        The operational state of the interface
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - up
                - down
                - testing
          required:
            - value
    InterfaceOperDownReason:
      description: |
        The first (and possibly only) reason for the port being operationally down
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - port-admin-disabled
                - mda-admin-disabled
                - transceiver-oper-down
                - port-not-present
                - mda-not-present
                - phy-initializing
                - lower-layer-down
                - auto-negotiation-mismatch
                - port-mtu-resource-exceeded
                - unsupported-speed
                - unsupported-fec
                - other
                - fabric-availability
                - no-active-links
                - min-link-threshold
                - port-9-12-speed-mismatch
                - lag-resource-exceeded
                - lag-member-resource-exceeded
                - standby-signaling
                - interface-hold-time-up-active
                - interface-reload-timer-active
                - connector-down
                - event-handler
                - unsupported-breakout-port
                - cfm-ccm-defect
                - crc-monitor-fail-threshold
                - symbol-monitor-fail-threshold
                - link-loss-forwarding
                - storm-control-action
                - unsupported-num-channels-for-speed
                - loop-detected
          required:
            - value
    InterfaceLastChange:
      description: |
        The date and time of the most recent change to the interface state
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
          required:
            - value
    InterfaceLinecard:
      description: |
        The linecard on which this interface resides
        
        This field is not populated for non-forwarding-complex-attached interfaces, for example mgmt0.
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Relationship'
        - type: object
          properties:
            object:
              description: Relationship with Entity type Linecard.
              type: string
          required:
            - object
    InterfaceForwardingComplex:
      description: |
        The forwarding-complex on which this interface resides
        
        This field is not populated for non-forwarding-complex-attached interfaces, for example mgmt0.
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Relationship'
        - type: object
          properties:
            object:
              description: Relationship with Entity type ForwardingComplex.
              type: string
          required:
            - object
    PhyGroupMembers:
      description: |
        The group of interfaces sharing a phy with this interface
        
        On the 7220 IXR-D2 and 7220 IXR-D2L platforms this group of interfaces must be set to the same speed, either 1/10G or 25G.
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
          required:
            - value
    PhysicalChannel:
      description: |
        The list of transceiver channels associated with this port
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Relationship'
        - type: object
          properties:
            object:
              description: Relationship with Entity type Channel.
              type: string
          required:
            - object
    ForwardingMode:
      description: |
        The forwarding mode for Ethernet frames received on this interface
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - store-and-forward
                - cut-through
          required:
            - value
    InterfaceStatistics:
      description: |
        
        YANG module: srl_nokia-interfaces.yang
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Entity'
        - type: object
          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be InterfaceStatistics.
              type: string
              enum:
                - InterfaceStatistics
              default: InterfaceStatistics
            inPackets:
              $ref: '#/components/schemas/InterfaceStatisticsInPackets'
            inOctets:
