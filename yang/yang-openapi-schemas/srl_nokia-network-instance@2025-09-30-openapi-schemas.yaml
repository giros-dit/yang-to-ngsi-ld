    InterfaceSubinterfaceAnycastGw:
      description: |
        
        YANG module: srl_nokia-interfaces.yang
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Entity'
        - type: object
          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be InterfaceSubinterfaceAnycastGw.
              type: string
              enum:
                - InterfaceSubinterfaceAnycastGw
              default: InterfaceSubinterfaceAnycastGw
            virtualRouterId:
              $ref: '#/components/schemas/VirtualRouterId'
            anycastGwMac:
              $ref: '#/components/schemas/AnycastGwMac'
            anycastGwMacOrigin:
              $ref: '#/components/schemas/AnycastGwMacOrigin'
            isPartOf:
              $ref: '#/components/schemas/IsPartOf'
              description: isPartOf Relationship with Entity type InterfaceSubinterface.
        - required:
          - type
          - isPartOf
    VirtualRouterId:
      description: |
        The Virtual Router Identifier (VRID) value used to auto-derive the anycast-gw-mac in the format 00:00:5E:00:01:VRID.
        
        Reference: draft-ietf-bess-evpn-inter-subnet-forwarding
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
              default: 1
              minimum: 1
              maximum: 255
          required:
            - value
    AnycastGwMac:
      description: |
        The MAC address of associated to the anycast-gw IP address.
        
        If the anycast-gw MAC address is not configured, it will be auto-derived from the virtual-router-id value
        as per draft-ietf-bess-evpn-inter-subnet-forwarding following the format 00:00:5E:00:01:VRID.
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              pattern: '[0-9a-fA-F]{2}(:[0-9a-fA-F]{2}){5}'
          required:
            - value
    AnycastGwMacOrigin:
      description: |
        Origin of the active anycast-gateway MAC address.
        
        If not configured, the anycast-gateway-mac will be auto-derived out of 00:00:5E:00:01:VRID, where VRID is the
        Virtual Router Identifier of the subinterface anycast-gw.
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - configured
                - vrid-auto-derived
          required:
            - value
