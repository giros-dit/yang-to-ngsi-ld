      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Entity'
        - type: object
          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be NetworkInstanceMplsForwarding.
              type: string
              enum:
                - NetworkInstanceMplsForwarding
              default: NetworkInstanceMplsForwarding
            forwardReceivedPackets:
              $ref: '#/components/schemas/ForwardReceivedPackets'
            isPartOf:
              $ref: '#/components/schemas/IsPartOf'
              description: isPartOf Relationship with Entity type NetworkInstance.
        - required:
          - type
          - isPartOf
    ForwardReceivedPackets:
      description: |
        When set to true, MPLS packets received on any subinterface of the network-instance will be forwarded according to the matching ILM entries.
        
        When set to false, MPLS packets are discarded if received on any subinterface of the network-instance.
        
        In the default network-instance the default is 'true'.
        
        YANG module: srl_nokia-network-instance.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: boolean
          required:
            - value
    NetworkInstanceIpForwarding:
      description: |
        Forwarding options that apply to the entire network instance.
        
        YANG module: srl_nokia-network-instance.yang
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Entity'
        - type: object
          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be NetworkInstanceIpForwarding.
              type: string
              enum:
                - NetworkInstanceIpForwarding
              default: NetworkInstanceIpForwarding
            receiveIpv4Check:
              $ref: '#/components/schemas/ReceiveIpv4Check'
            receiveIpv6Check:
              $ref: '#/components/schemas/ReceiveIpv6Check'
            isPartOf:
              $ref: '#/components/schemas/IsPartOf'
              description: isPartOf Relationship with Entity type NetworkInstance.
        - required:
          - type
          - isPartOf
    ReceiveIpv4Check:
      description: |
        If set to true then the following check is done on every subinterface of the network-instance: if an IPv4 packet is received on a subinterface and the IPv4 oper-status of this subinterface is down the packet is discarded. If this leaf is set to false then received IPv4 packets are accepted on all subinterfaces of the network-instance that are up, even if they do not have any IPv4 addresses.
        
        YANG module: srl_nokia-network-instance.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: boolean
          required:
            - value
    ReceiveIpv6Check:
      description: |
        If set to true then the following check is done on every subinterface of the network-instance: if an IPv6 packet is received on a subinterface and the IPv6 oper-status of this subinterface is down the packet is discarded. If this leaf is set to false then received IPv6 packets are accepted on all subinterfaces of the network-instance that are up, even if they do not have any IPv6 addresses.
        
        YANG module: srl_nokia-network-instance.yang
