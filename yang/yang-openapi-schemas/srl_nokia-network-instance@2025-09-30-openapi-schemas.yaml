          required:
            - value
    InterfaceSubinterfaceIpv6Statistics:
      description: |
        Container for subinterface statistics, including all IPv4, IPv6 and MPLS packets belonging to a routed subinterface, or including just one of these protocols on a routed subinterface, or for all frames on a bridged subinterface
        
        YANG module: srl_nokia-interfaces.yang
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Entity'
        - type: object
          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be InterfaceSubinterfaceIpv6Statistics.
              type: string
              enum:
                - InterfaceSubinterfaceIpv6Statistics
              default: InterfaceSubinterfaceIpv6Statistics
            inPackets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv6StatisticsInPackets'
            inOctets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv6StatisticsInOctets'
            inErrorPackets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv6StatisticsInErrorPackets'
            inDiscardedPackets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv6StatisticsInDiscardedPackets'
            inTerminatedPackets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv6StatisticsInTerminatedPackets'
            inTerminatedOctets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv6StatisticsInTerminatedOctets'
            inForwardedPackets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv6StatisticsInForwardedPackets'
            inForwardedOctets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv6StatisticsInForwardedOctets'
            inMatchedRaPackets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv6StatisticsInMatchedRaPackets'
            outForwardedPackets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv6StatisticsOutForwardedPackets'
            outForwardedOctets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv6StatisticsOutForwardedOctets'
            outOriginatedPackets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv6StatisticsOutOriginatedPackets'
            outOriginatedOctets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv6StatisticsOutOriginatedOctets'
            outErrorPackets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv6StatisticsOutErrorPackets'
            outDiscardedPackets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv6StatisticsOutDiscardedPackets'
            outPackets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv6StatisticsOutPackets'
            outOctets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv6StatisticsOutOctets'
            lastClear:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv6StatisticsLastClear'
            isPartOf:
              $ref: '#/components/schemas/IsPartOf'
              description: isPartOf Relationship with Entity type InterfaceSubinterfaceIpv6.
        - required:
          - type
          - isPartOf
    InterfaceSubinterfaceIpv6StatisticsInPackets:
      description: |
        The total number of input packets received, counting transit and terminating traffic
        
        This equals the sum of:
        in-error-packets
        in-discarded-packets
        in-terminated-packets
        in-forwarded-packets
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceSubinterfaceIpv6StatisticsInOctets:
      description: |
        The total number of octets received in input packets, counting transit and terminating traffic
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceSubinterfaceIpv6StatisticsInErrorPackets:
      description: |
        The total number of input packets discarded due to errors, counting transit and terminating traffic
        
        In an IP context, the sum of the following RFC 4293 counters:
        ipIfStatsInHdrErrors
        ipIfStatsInNoRoutes
        ipIfStatsInAddrErrors
        ipIfStatsInUnknownProtos
        ipIfStatsInTruncatedPkts
        
        In an MPLS context, the total number of MPLS packets that were dropped because:
        - forwarded top label had an MPLS TTL value of 0
        - terminating top label had an MPLS TTL value of 0
        - the top label was unknown (no matching forwarding entry)
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceSubinterfaceIpv6StatisticsInDiscardedPackets:
      description: |
        The total number of input packets that were dropped due to explicit programming
        
        The discards can be due to any of the following reasons
        - ingress interface ACL drop action
        - CPM filter drop action
        - VOQ congestion discards (7250 IXR only)
        - unicast destination MAC address is not the MAC address of the subinterface
        - packet matched a route with a blackhole next-hop
        - packet was non-terminating and its TTL expired
        - packet matched a route with a next-hop via another subinterface but the next-hop address was not resolvable by ARP/ND
        - packet is a host address on another subinterface but the host address was not resolvable by ARP/ND
        
        In an MPLS context, this includes the total number of MPLS packets that were dropped because they were received with forwarded top label having an MPLS TTL value of 1
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceSubinterfaceIpv6StatisticsInTerminatedPackets:
      description: |
        The total number of input packets that were received on this subinterface that were extracted to the control plane
        
        The count includes packets eventually discarded by the CPM. Such discards include:
        - packets with unsupported IP protocol numbers
        - packets destined to TCP/UDP ports that are not open/listening
        - IPv4 packets with any IP options
        - IPv6 packets with any extension headers
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceSubinterfaceIpv6StatisticsInTerminatedOctets:
      description: |
        The total number of octets in packets that were received on this subinterface and counted in in-terminated-packets
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceSubinterfaceIpv6StatisticsInForwardedPackets:
      description: |
        The number of packets received on this subinterface for which the router was not the final destination and for which the router attempted to find a route to forward them to that final destination.
        
        Note that non-terminating IPv4 packets with options and non-terminating IPv6 packets with extension headers are included in this count as are packets that trigger ICMP/ICMPv6 redirect messages.
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceSubinterfaceIpv6StatisticsInForwardedOctets:
      description: |
        The number of octets in packets received on this subinterface counted in in-forwarded-packets
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceSubinterfaceIpv6StatisticsInMatchedRaPackets:
      description: |
        The total number of IPv6 packets matched with applied RA-Guard policy
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceSubinterfaceIpv6StatisticsOutForwardedPackets:
      description: |
        The number of transit packets which the router attempted to forward out this subinterface
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceSubinterfaceIpv6StatisticsOutForwardedOctets:
      description: |
        The number of octets in transit packets which the router attempted to forward out this subinterface
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceSubinterfaceIpv6StatisticsOutOriginatedPackets:
      description: |
        The number of packets which originated on the CPM and which the router attempted to forward out this subinterface
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceSubinterfaceIpv6StatisticsOutOriginatedOctets:
      description: |
        The number of octets in packets which originated on the CPM and which the router attempted to forward out this subinterface
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceSubinterfaceIpv6StatisticsOutErrorPackets:
      description: |
        The number of packets, originating and transit, for which this router was successful in finding a path to their final destination through this subinterface but an error prevented their transmission
        
        On 7250 IXR systems this is incremented when the IPv4 packet size exceeds the IP MTU and fragmentation was not allowed or not supported. It is also incremented when the MPLS packet size exceeds the MPLS MTU of the subinterface.
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceSubinterfaceIpv6StatisticsOutDiscardedPackets:
      description: |
        The total number of packets, originating and transit, that should have been sent out this subinterface but were dropped
        
        This includes IP packets dropped by egress interface ACL drop action.
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceSubinterfaceIpv6StatisticsOutPackets:
      description: |
        The total number of packets that this router supplied to the lower layers for transmission
        
        This equals the sum of:
        out-error-packets
        out-discarded-packets
        out-originated-packets
        out-forwarded-packets
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceSubinterfaceIpv6StatisticsOutOctets:
      description: |
        The total number of octets in packets delivered to the lower layers for transmission
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
