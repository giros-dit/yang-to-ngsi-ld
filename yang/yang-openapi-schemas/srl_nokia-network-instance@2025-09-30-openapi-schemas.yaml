      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
          required:
            - value
    SystemAuthenticationKeychainKeyMacsec:
      description: |
        Container to configure macsec CAK and CAK Name.
        
        YANG module: srl_nokia-keychains.yang
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Entity'
        - type: object
          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be SystemAuthenticationKeychainKeyMacsec.
              type: string
              enum:
                - SystemAuthenticationKeychainKeyMacsec
              default: SystemAuthenticationKeychainKeyMacsec
            cak:
              $ref: '#/components/schemas/Cak'
            keyName:
              $ref: '#/components/schemas/KeyName'
            adminState:
              $ref: '#/components/schemas/SystemAuthenticationKeychainKeyMacsecAdminState'
            isPartOf:
              $ref: '#/components/schemas/IsPartOf'
              description: isPartOf Relationship with Entity type SystemAuthenticationKeychainKey.
        - required:
          - type
          - isPartOf
          - cak
          - keyName
    Cak:
      description: |
        MACsec CAK, a hexadecimal name is only valid
        
        YANG module: srl_nokia-keychains.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
          required:
            - value
    KeyName:
      description: |
        MACsec CKN, a hexadecimal name is only valid
        
        YANG module: srl_nokia-keychains.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              pattern: '([0-9a-fA-F][0-9a-fA-F])+'
          required:
            - value
    SystemAuthenticationKeychainKeyMacsecAdminState:
      description: |
        When set to disable, this key entry is inactive
        
        For macsec the cak and key-name can only be changed when the key entry id disabled
        
        YANG module: srl_nokia-keychains.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - enable
                - disable
              default: disable
          required:
            - value
    SystemAuthenticationKeychainKeySendLifetime:
      description: |
        Specifies the lifetime of the key for sending authentication information to the peer
        
        YANG module: srl_nokia-keychains.yang
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Entity'
        - type: object
          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be SystemAuthenticationKeychainKeySendLifetime.
              type: string
              enum:
                - SystemAuthenticationKeychainKeySendLifetime
              default: SystemAuthenticationKeychainKeySendLifetime
            startTime:
              $ref: '#/components/schemas/SystemAuthenticationKeychainKeySendLifetimeStartTime'
            sendAndReceive:
              $ref: '#/components/schemas/SendAndReceive'
            isPartOf:
              $ref: '#/components/schemas/IsPartOf'
              description: isPartOf Relationship with Entity type SystemAuthenticationKeychainKey.
        - required:
          - type
          - isPartOf
    SystemAuthenticationKeychainKeySendLifetimeStartTime:
      description: |
        The time at which the key becomes valid for use in the send direction
        
        The default is the Unix Epoch (Jan 1, 1970 00:00:00 UTC).
        
        If there are multiple keys in the keychain the one used for sending authentication information is the key with the most recent send-lifetime start-time that is earlier than the current date and time
        
        YANG module: srl_nokia-keychains.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
          required:
            - value
    SendAndReceive:
      description: |
        When this is set to true (the default value), the specified start-time also applies to the receive direction
        
        When set to false, router uses the specific start-time for the receive direction (asymmetric mode).
        
        YANG module: srl_nokia-keychains.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: boolean
          required:
            - value
    SystemAuthenticationKeychainKeyReceiveLifetime:
      description: |
        
        YANG module: srl_nokia-keychains.yang
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Entity'
        - type: object
          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be SystemAuthenticationKeychainKeyReceiveLifetime.
              type: string
              enum:
                - SystemAuthenticationKeychainKeyReceiveLifetime
              default: SystemAuthenticationKeychainKeyReceiveLifetime
            startTime:
              $ref: '#/components/schemas/SystemAuthenticationKeychainKeyReceiveLifetimeStartTime'
            endTime:
              $ref: '#/components/schemas/EndTime'
            isPartOf:
              $ref: '#/components/schemas/IsPartOf'
              description: isPartOf Relationship with Entity type SystemAuthenticationKeychainKey.
        - required:
          - type
          - isPartOf
    SystemAuthenticationKeychainKeyReceiveLifetimeStartTime:
      description: |
        The time at which the key becomes valid for use in the receive direction
        
        If send-and-receive is true, this value is ignored. If send-and-receive is false the default is the Unix Epoch (Jan 1, 1970 00:00:00 UTC).
        
        If there are multiple keys in the keychain the one used for checking received authentication information is the key with the most recent receive-lifetime start-time that is earlier than the current date and time and that has not exceeded its receive-lifetime end-time by more than 'tolerance' seconds
        
        YANG module: srl_nokia-keychains.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
          required:
            - value
    EndTime:
      description: |
        The time at which the key becomes invalid for use in the receive direction
        
        The default is forever.
        
        YANG module: srl_nokia-keychains.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
          required:
            - value
    SystemLldp:
      description: |
        Top-level container for LLDP configuration and state data
        
        YANG module: srl_nokia-lldp.yang
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Entity'
        - type: object
          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be SystemLldp.
              type: string
              enum:
                - SystemLldp
              default: SystemLldp
            traceOptions:
              $ref: '#/components/schemas/SystemLldpTraceOptions'
            adminState:
              $ref: '#/components/schemas/SystemLldpAdminState'
            helloTimer:
              $ref: '#/components/schemas/HelloTimer'
            holdMultiplier:
              $ref: '#/components/schemas/HoldMultiplier'
            systemName:
              $ref: '#/components/schemas/SystemLldpSystemName'
            systemDescription:
              $ref: '#/components/schemas/SystemLldpSystemDescription'
            chassisId:
              $ref: '#/components/schemas/SystemLldpChassisId'
            chassisIdType:
              $ref: '#/components/schemas/SystemLldpChassisIdType'
            isPartOf:
              $ref: '#/components/schemas/IsPartOf'
              description: isPartOf Relationship with Entity type System.
        - required:
          - type
          - isPartOf
    SystemLldpTraceOptions:
      description: |
        LLDP trace options
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - received
                - transmitted
                - common
          required:
            - value
    SystemLldpAdminState:
      description: |
        Enable or disable LLDP at the system level
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - enable
                - disable
              default: enable
          required:
            - value
    HelloTimer:
      description: |
        System level hello timer for the LLDP protocol
        
        Units: seconds
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
              default: 30
          required:
            - value
    HoldMultiplier:
      description: |
        System level hold multiplier, used to define neighbor aging
        
        This field defines how many hellos need to be missed before
        a neighbor is aged out.
        
        This field also is used along with the 'hello-timer' field
        to define the TTL TLV in outgoing LLDPDUs.
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
              default: 4
          required:
            - value
    SystemLldpBgpAutoDiscovery:
      description: |
        Top-level container for global LLDP BGP auto discovery
        
        YANG module: srl_nokia-lldp.yang
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Entity'
        - type: object
          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be SystemLldpBgpAutoDiscovery.
              type: string
              enum:
                - SystemLldpBgpAutoDiscovery
              default: SystemLldpBgpAutoDiscovery
            adminState:
              $ref: '#/components/schemas/SystemLldpBgpAutoDiscoveryAdminState'
            networkInstance:
              $ref: '#/components/schemas/SystemLldpBgpAutoDiscoveryNetworkInstance'
            groupId:
              $ref: '#/components/schemas/SystemLldpBgpAutoDiscoveryGroupId'
            isPartOf:
              $ref: '#/components/schemas/IsPartOf'
              description: isPartOf Relationship with Entity type SystemLldp.
        - required:
          - type
          - isPartOf
    SystemLldpBgpAutoDiscoveryAdminState:
      description: |
        Enable or disable LLDP BGP auto discovery at the system level
        
        Setting this to disable will override any per-interface LLDP
        BGP autodiscovery configuration
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - enable
                - disable
              default: disable
          required:
            - value
    SystemLldpBgpAutoDiscoveryNetworkInstance:
      description: |
        List of network instances to enable LLDP BGP auto discovery in
        
        Default is to run LLDP BGP auto discovery in all network instances
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Relationship'
        - type: object
          properties:
            object:
              description: Relationship with Entity type NetworkInstance.
              type: string
          required:
            - object
    SystemLldpBgpAutoDiscoveryGroupId:
      description: |
        A four byte integer to send on outgoing LLDPDUs
        
        This value can be used on the remote end to do peer group association.
        This sub-TLV is not sent by default
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    SystemLldpSystemName:
      description: |
        The systems administratively assigned name
        
        The system name field shall contain an alpha-numeric string
        that indicates the system's administratively assigned name.
        The system name should be the system's fully qualified domain
        name.
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
          required:
            - value
    SystemLldpSystemDescription:
      description: |
        Field detailing system description, including name and versions
        
        The system description field shall contain an alpha-numeric
        string that is the textual description of the network entity.
        The system description should include the full name and
        version identification of the system's hardware type,
        software operating system, and networking software.
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
          required:
            - value
    SystemLldpChassisId:
      description: |
        The Chassis ID is a mandatory TLV which identifies the
        chassis component of the endpoint identifier associated with
        the transmitting LLDP agent
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
          required:
            - value
    SystemLldpChassisIdType:
      description: |
        The source for the chassis identifier string
        
        It is an enumerator defined by the LldpChassisIdSubtype object
        from IEEE 802.1AB MIB.
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - CHASSIS_COMPONENT
                - INTERFACE_ALIAS
                - PORT_COMPONENT
                - MAC_ADDRESS
                - NETWORK_ADDRESS
                - INTERFACE_NAME
                - LOCAL
              default: MAC_ADDRESS
          required:
            - value
    SystemLldpManagementAddress:
      description: |
        List of subinterfaces to source management addresses from
        
        This list is sent in the management address TLV by LLDP.
        
        YANG module: srl_nokia-lldp.yang
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Entity'
        - type: object
          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be SystemLldpManagementAddress.
              type: string
              enum:
                - SystemLldpManagementAddress
              default: SystemLldpManagementAddress
            subinterface:
              $ref: '#/components/schemas/SystemLldpManagementAddressSubinterface'
            managementaddressType:
              $ref: '#/components/schemas/SystemLldpManagementAddressType'
            isPartOf:
              $ref: '#/components/schemas/IsPartOf'
              description: isPartOf Relationship with Entity type SystemLldp.
        - required:
          - type
          - isPartOf
    SystemLldpManagementAddressSubinterface:
      description: |
        Reference to the subinterface to source management addresses
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              pattern: '(mgmt0\.0|system0\.0|sync0\.0|lo(0|1[0-9][0-9]|2([0-4][0-9]|5[0-5])|[1-9][0-9]|[1-9])\.(0|[1-9](\d){0,3})|lif-.*\.(0|[1-9](\d){0,3})|vhn-.*\.(0|[1-9](\d){0,3})|enp(0|1[0-9][0-9]|2([0-4][0-9]|5[0-5])|[1-9][0-9]|[1-9])s(0|[1-9]|[1-2][0-9]|3[0-1])f[0-7]\.(0|[1-9](\d){0,3})|ethernet-([1-9](\d){0,1}(/m[1-6])?(/[1-9](\d){0,1})?/(([1-9](\d){0,1})|(1[0-1]\d)|(12[0-8])))\.([0]|[1-9](\d){0,3})|irb(0|1[0-9][0-9]|2([0-4][0-9]|5[0-5])|[1-9][0-9]|[1-9])\.(0|[1-9](\d){0,3})|lag(([1-9](\d){0,2})|(1000))\.(0|[1-9](\d){0,3}))'
          required:
            - value
    SystemLldpManagementAddressType:
      description: |
        Types of addresses sent in the management address TLV
        
        The enumerated value for the network address type
        identified in this TLV. This enumeration is defined in the
        'Assigned Numbers' RFC [RFC3232] and the
        ianaAddressFamilyNumbers object.
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - IPv4
                - IPv6
          required:
            - value
    SystemLldpLldpMed:
      description: |
        
        YANG module: srl_nokia-lldp.yang
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Entity'
        - type: object
          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be SystemLldpLldpMed.
              type: string
              enum:
                - SystemLldpLldpMed
              default: SystemLldpLldpMed
            medFastTransmitInterval:
              $ref: '#/components/schemas/MedFastTransmitInterval'
            medFastTransmitRepeatCount:
              $ref: '#/components/schemas/MedFastTransmitRepeatCount'
            topologyChangeNotification:
              $ref: '#/components/schemas/TopologyChangeNotification'
            isPartOf:
              $ref: '#/components/schemas/IsPartOf'
              description: isPartOf Relationship with Entity type SystemLldp.
        - required:
          - type
          - isPartOf
    MedFastTransmitInterval:
      description: |
        Transmit interval activated whenever an LLDP-MED Capabilities TLV received is not associated with a remote system
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
              default: 1
              minimum: 1
              maximum: 3600
          required:
            - value
    MedFastTransmitRepeatCount:
      description: |
        Duration of the fast-start process, in number of packets
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
              default: 4
              minimum: 1
              maximum: 8
          required:
            - value
    TopologyChangeNotification:
      description: |
        Indicate whether to generate topology change notifications for endpoints
        
        Used to track the movement of portable equipment using of events.
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: boolean
              default: false
          required:
            - value
    SystemLldpLldpMedNetworkPolicy:
      description: |
        Network policy distribution of configuration attributes based on application type
        
        YANG module: srl_nokia-lldp.yang
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Entity'
        - type: object
          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be SystemLldpLldpMedNetworkPolicy.
              type: string
              enum:
                - SystemLldpLldpMedNetworkPolicy
              default: SystemLldpLldpMedNetworkPolicy
            name:
              $ref: '#/components/schemas/SystemLldpLldpMedNetworkPolicyName'
            applicationType:
              $ref: '#/components/schemas/ApplicationType'
            vlanId:
              $ref: '#/components/schemas/SystemLldpLldpMedNetworkPolicyVlanId'
            dot1p:
              $ref: '#/components/schemas/SystemLldpLldpMedNetworkPolicyDot1p'
            dscp:
              $ref: '#/components/schemas/SystemLldpLldpMedNetworkPolicyDscp'
            isPartOf:
              $ref: '#/components/schemas/IsPartOf'
              description: isPartOf Relationship with Entity type SystemLldpLldpMed.
        - required:
          - type
          - isPartOf
    SystemLldpLldpMedNetworkPolicyName:
      description: |
        List name
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              pattern: '[A-Za-z0-9!@#$%^&()|+=`~.,_:;?-][A-Za-z0-9 !@#$%^&()|+=`~.,_:;?-]*'
          required:
            - value
    ApplicationType:
      description: |
        Application type for network policy
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
          required:
            - value
    SystemLldpLldpMedNetworkPolicyVlanId:
      description: |
        VLAN tagging requirements for the application type, VLAN-ID (range 0..4094) or untagged
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              default: untagged
