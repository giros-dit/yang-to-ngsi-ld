          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be NetworkInstanceConnectionPointPseudowireSignalingSignalingStatic.
              type: string
              enum:
                - NetworkInstanceConnectionPointPseudowireSignalingSignalingStatic
              default: NetworkInstanceConnectionPointPseudowireSignalingSignalingStatic
            ingressVcLabel:
              $ref: '#/components/schemas/IngressVcLabel'
            egressVcLabel:
              $ref: '#/components/schemas/EgressVcLabel'
            isPartOf:
              $ref: '#/components/schemas/IsPartOf'
              description: isPartOf Relationship with Entity type NetworkInstanceConnectionPointPseudowireSignalingSignaling.
        - required:
          - type
          - isPartOf
    IngressVcLabel:
      description: |
        The value of the configured ingress vc label
        
        The ingress virtual circuit mpls label is configured if the
        pseudowire signaling is static.
        
        YANG module: srl_nokia-network-instance.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
