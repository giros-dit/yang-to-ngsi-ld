              $ref: '#/components/schemas/ProtectionPolicyName'
            revertTimer:
              $ref: '#/components/schemas/RevertTimer'
            isPartOf:
              $ref: '#/components/schemas/IsPartOf'
              description: isPartOf Relationship with Entity type System.
        - required:
          - type
          - isPartOf
    ProtectionPolicyName:
      description: |
        A unique identifying name for the protection policy
        
        YANG module: srl_nokia-protection-policies.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
