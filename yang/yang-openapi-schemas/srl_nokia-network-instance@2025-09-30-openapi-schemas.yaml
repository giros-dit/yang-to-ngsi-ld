                - booting
                - starting
                - failed
                - synchronizing
                - upgrading
                - low-power
                - degraded
                - warm-reboot
                - waiting
          required:
            - value
    NetworkInstanceOperDownReason:
      description: |
        The reason the network-instance is down
        
        YANG module: srl_nokia-network-instance.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - admin-down
                - no-mcid
          required:
            - value
    OperMacVrfMtu:
      description: |
        Operational l2-mtu of the mac-vrf network-instance
        
        Calculated as the lowest l2-mtu of the bridged subinterfaces associated to
        the mac-vrf, minus the associated vlan tags of the subinterface. The subinterface
        l2-mtu is the value configured under the subinterface, or the system/mtu/default-l2-mtu
        value otherwise. For mac-vrf network-instances without subinterfaces, the oper-mac-vrf-mtu
        matches the system/mtu/default-l2-mtu value.
        
        When the mac-vrf has an associated irb subinterface, if the configured irb ip-mtu exceeds
        the oper-mac-vrf-mtu minus 14 bytes (Ethernet header), then the irb subinterface will remain
        operationally down.
        
        The oper-mac-vrf-mtu is only available in mac-vrf network-instances.
        
        Units: bytes
        
        YANG module: srl_nokia-network-instance.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
              minimum: 1492
              maximum: 9500
          required:
            - value
    OperVpwsMtu:
      description: |
        Operational l2-mtu of the vpws network-instance
        
        Derived from the lowest l2-mtu value of the bridged subinterfaces
        associated to the vpws, minus the vlan tags associated to that
        subinterface. If the vpws network-instance does not have subinterfaces
        the oper-vpws-mtu value is computed as the system/mtu/default-l2-mtu value.
        
        The oper-vpws-mtu is only available in vpws network-instances.
        
        Units: bytes
        
        YANG module: srl_nokia-network-instance.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
              minimum: 1492
              maximum: 9500
          required:
            - value
    NetworkInstanceDescription:
      description: |
        A user-entered description of this network instance.
        
        YANG module: srl_nokia-network-instance.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
          required:
            - value
    NetworkInstanceRouterId:
      description: |
        A identifier for the local network instance - typically
        used within associated routing protocols or signalling
        routing information in another network instance
        
        YANG module: srl_nokia-network-instance.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              pattern: '(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])'
          required:
            - value
    NetworkInstanceMplsForwarding:
      description: |
        
