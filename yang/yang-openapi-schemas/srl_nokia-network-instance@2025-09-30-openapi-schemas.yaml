    ControlWord:
      description: |
        Whether control word is enabled for the pseudowire
        
        If set to true, the router signals the support of the control
        word for the pseudowires. If the remote peer signals support
        for the control word too, the router pushes the control word
        immediately below the vc label (or the flow-label if enabled).
        
        YANG module: srl_nokia-network-instance.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: boolean
              default: false
          required:
            - value
    FlowLabel:
      description: |
        Whether the flow aware transport (FAT) label is enabled for the pseudowire
        
        If set to true, the router signals the support of the FAT label for the
        pseudowire. If the remote peer signals support for the FAT label too, the
        router pushes the FAT label immediately below the vc label.
        
        YANG module: srl_nokia-network-instance.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: boolean
              default: false
          required:
            - value
    FlowLabelOperState:
      description: |
        Operational state of the flow label on the pseudowire
        
        The state depends on the local configuration of flow-label and the R flag
        signaled by the peer. When set to down, the flow-aware transport label is
        not used irrespective of the local configuration of the flow-label.
        
        YANG module: srl_nokia-network-instance.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - up
                - down
                - empty
                - downloading
                - booting
                - starting
                - failed
                - synchronizing
                - upgrading
                - low-power
                - degraded
                - warm-reboot
                - waiting
          required:
            - value
    Precedence:
      description: |
        The precedence value of the pseudowire within the connection point
        
        The precedence value is used to select the (only) pseudowire that transmits traffic in
        the connection-point (referred to as primary pseudowire). After removing from consideration
        all the pseudowires that are operationally down or receive T-LDP pseudowire status
        signaling different from 'pseudowire-forwarding' (all the bits set to zero), the pseudowire
        with the lowest precedence value is selected as active to transmit traffic in the
        connection-point. The value 'primary' is considered lower than any of the numerical values
        ('primary' is equivalent to value '0'), with value '4' being the highest value.
        
        The router forces the user to configure different precedence values for the pseudowires
        in the connection-point. The selected primary pseudowire is used to transmit traffic and
        the router only switches to another secondary pseudowire when the primary is down. The connection-point
        switches the path back to the primary pseudowire when it is back up, unless the connection-point is
        configured with 'revert-time never'.
        
        YANG module: srl_nokia-network-instance.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
          required:
            - value
    NetworkInstanceConnectionPointPseudowireSignaling:
      description: |
        Signaling configuration for the pseudowire
        
        YANG module: srl_nokia-network-instance.yang
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Entity'
        - type: object
          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be NetworkInstanceConnectionPointPseudowireSignaling.
              type: string
              enum:
                - NetworkInstanceConnectionPointPseudowireSignaling
              default: NetworkInstanceConnectionPointPseudowireSignaling
            virtualCircuitIdentifier:
              $ref: '#/components/schemas/VirtualCircuitIdentifier'
            isPartOf:
              $ref: '#/components/schemas/IsPartOf'
              description: isPartOf Relationship with Entity type NetworkInstanceConnectionPointPseudowire.
        - required:
          - type
          - isPartOf
          - virtualCircuitIdentifier
    VirtualCircuitIdentifier:
      description: |
        The virtual circuit identifier of the pseudowire
        
        YANG module: srl_nokia-network-instance.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
