    SystemLldpInterfaceOperState:
      description: |
        Details the operational state of LLDP on the interface
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - up
                - down
                - empty
                - downloading
                - booting
                - starting
                - failed
                - synchronizing
                - upgrading
                - low-power
                - degraded
                - warm-reboot
                - waiting
          required:
            - value
    SystemLldpInterfaceStatistics:
      description: |
        LLDP counters on each interface
        
        YANG module: srl_nokia-lldp.yang
      allOf:
