    SystemLldpInterfaceNeighbor:
      description: |
        List of LLDP neighbors on this interface
        
        YANG module: srl_nokia-lldp.yang
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Entity'
        - type: object
          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be SystemLldpInterfaceNeighbor.
              type: string
              enum:
                - SystemLldpInterfaceNeighbor
              default: SystemLldpInterfaceNeighbor
            id:
              $ref: '#/components/schemas/SystemLldpInterfaceNeighborId'
            firstMessage:
              $ref: '#/components/schemas/FirstMessage'
            lastUpdate:
              $ref: '#/components/schemas/LastUpdate'
            systemName:
              $ref: '#/components/schemas/SystemLldpInterfaceNeighborSystemName'
            systemDescription:
              $ref: '#/components/schemas/SystemLldpInterfaceNeighborSystemDescription'
            chassisId:
              $ref: '#/components/schemas/SystemLldpInterfaceNeighborChassisId'
            chassisIdType:
              $ref: '#/components/schemas/SystemLldpInterfaceNeighborChassisIdType'
            portId:
              $ref: '#/components/schemas/PortId'
            portIdType:
              $ref: '#/components/schemas/PortIdType'
            portDescription:
              $ref: '#/components/schemas/PortDescription'
            isPartOf:
              $ref: '#/components/schemas/IsPartOf'
              description: isPartOf Relationship with Entity type SystemLldpInterface.
        - required:
          - type
          - isPartOf
    SystemLldpInterfaceNeighborId:
      description: |
        System generated identifier for the remote neighbor
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
          required:
            - value
    FirstMessage:
      description: |
        Date and time of the first message from neighbor
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
          required:
            - value
    LastUpdate:
      description: |
        Date and time of the last update from neighbor
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
          required:
            - value
    SystemLldpInterfaceNeighborSystemName:
      description: |
        The administratively assigned name of the remote neighbor
        
        The system name field shall contain an alpha-numeric string
        that indicates the system's administratively assigned name.
        The system name should be the system's fully qualified domain
        name. If implementations support IETF RFC 3418, the sysName
        object should be used for this field.
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
          required:
            - value
    SystemLldpInterfaceNeighborSystemDescription:
      description: |
        The system description of the remote neighbor
        
        The system description field shall contain an alpha-numeric
        string that is the textual description of the network entity.
        The system description should include the full name and
        version identification of the system's hardware type,
        software operating system, and networking software. If
        implementations support IETF RFC 3418, the sysDescr object
        should be used for this field.
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
          required:
            - value
    SystemLldpInterfaceNeighborChassisId:
      description: |
        The chassis ID of the remote neighbor
        
        The Chassis ID is a mandatory TLV which identifies the
        chassis component of the endpoint identifier associated with
        the transmitting LLDP agent
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
          required:
            - value
    SystemLldpInterfaceNeighborChassisIdType:
      description: |
        The type of identifier used in the chassis-id field
        
        This field identifies the format and source of the chassis
        identifier string. It is an enumerator defined by the
        LldpChassisIdSubtype object from IEEE 802.1AB MIB.
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - CHASSIS_COMPONENT
                - INTERFACE_ALIAS
                - PORT_COMPONENT
                - MAC_ADDRESS
                - NETWORK_ADDRESS
                - INTERFACE_NAME
                - LOCAL
              default: MAC_ADDRESS
          required:
            - value
    PortId:
      description: |
        The Port ID of the remote neighbor
        
        The Port ID is a mandatory TLV which identifies the port
        component of the endpoint identifier associated with the
        transmitting LLDP agent. If the specified port is an IEEE
        802.3 Repeater port, then this TLV is optional.
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
          required:
            - value
    PortIdType:
      description: |
        The type of identifier used in the port-id field
        
        This field identifies the format and source of the port
        identifier string. It is an enumerator defined by the
        PtopoPortIdType object from RFC2922.
        
        Reference: RFC2922
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - INTERFACE_ALIAS
                - PORT_COMPONENT
                - MAC_ADDRESS
                - NETWORK_ADDRESS
                - INTERFACE_NAME
                - AGENT_CIRCUIT_ID
                - LOCAL
          required:
            - value
    PortDescription:
      description: |
        The description of the port referenced in the port-id field
        
        The binary string containing the actual port identifier for
        the port which this LLDP PDU was transmitted. The source and
        format of this field is defined by PtopoPortId from
        RFC2922.
        
        Reference: RFC2922
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
          required:
            - value
    SystemLldpInterfaceNeighborManagementAddress:
      description: |
        List of management addresses received from the remote LLDP neighbor
        
        YANG module: srl_nokia-lldp.yang
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Entity'
        - type: object
          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be SystemLldpInterfaceNeighborManagementAddress.
              type: string
              enum:
                - SystemLldpInterfaceNeighborManagementAddress
              default: SystemLldpInterfaceNeighborManagementAddress
            address:
              $ref: '#/components/schemas/SystemLldpInterfaceNeighborManagementAddressAddress'
            managementaddressType:
              $ref: '#/components/schemas/SystemLldpInterfaceNeighborManagementAddressType'
            isPartOf:
              $ref: '#/components/schemas/IsPartOf'
              description: isPartOf Relationship with Entity type SystemLldpInterfaceNeighbor.
        - required:
          - type
          - isPartOf
    SystemLldpInterfaceNeighborManagementAddressAddress:
      description: |
        The management address received from the remote LLDP neighbor
        
        The Management Address is a mandatory TLV which identifies a
        network address associated with the LLDP agent, which
        can be used to reach the agent on the port identified in the
        Port ID TLV.
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
          required:
            - value
    SystemLldpInterfaceNeighborManagementAddressType:
      description: |
        The type of management address referenced in the address field
        
        The enumerated value for the network address type
        identified in this TLV. This enumeration is defined in the
        'Assigned Numbers' RFC [RFC3232] and the
        ianaAddressFamilyNumbers object.
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - IPv4
                - IPv6
          required:
            - value
    SystemLldpInterfaceNeighborBgpAutoDiscovery:
      description: |
        Enclosing container for BGP auto discovery
        
        YANG module: srl_nokia-lldp.yang
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Entity'
        - type: object
          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be SystemLldpInterfaceNeighborBgpAutoDiscovery.
              type: string
              enum:
