              default: NetworkInstanceConnectionPointPseudowireSignalingSignalingTldp
            virtualCircuitType:
              $ref: '#/components/schemas/VirtualCircuitType'
            advertiseL2Mtu:
              $ref: '#/components/schemas/AdvertiseL2Mtu'
            ignoreMtuMismatch:
              $ref: '#/components/schemas/IgnoreMtuMismatch'
            isPartOf:
              $ref: '#/components/schemas/IsPartOf'
              description: isPartOf Relationship with Entity type NetworkInstanceConnectionPointPseudowireSignalingSignaling.
        - required:
