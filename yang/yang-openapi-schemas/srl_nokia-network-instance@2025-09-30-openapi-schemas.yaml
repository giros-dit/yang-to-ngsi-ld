              default: 95
              minimum: 6
              maximum: 100
          required:
            - value
    InterfaceSubinterfaceBridgeTableMacLearning:
      description: |
        
        YANG module: srl_nokia-interfaces.yang
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Entity'
        - type: object
          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be InterfaceSubinterfaceBridgeTableMacLearning.
              type: string
              enum:
                - InterfaceSubinterfaceBridgeTableMacLearning
              default: InterfaceSubinterfaceBridgeTableMacLearning
            adminState:
              $ref: '#/components/schemas/InterfaceSubinterfaceBridgeTableMacLearningAdminState'
            isPartOf:
              $ref: '#/components/schemas/IsPartOf'
              description: isPartOf Relationship with Entity type InterfaceSubinterfaceBridgeTable.
        - required:
          - type
          - isPartOf
    InterfaceSubinterfaceBridgeTableMacLearningAdminState:
      description: |
        Configurable state of the learning procedures for dynamic mac addresses.
        If disabled, the existing macs in the bridge-table will be kept (and refreshed
        if new frames arrive for them) but no new mac addresses will be learned. Frames
        with unknown mac addresses are not dropped, unless discard-unknown-src-mac is
        configured.
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - enable
                - disable
              default: enable
          required:
            - value
    InterfaceSubinterfaceBridgeTableMacLearningAging:
      description: |
        
        YANG module: srl_nokia-interfaces.yang
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Entity'
        - type: object
          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be InterfaceSubinterfaceBridgeTableMacLearningAging.
              type: string
              enum:
                - InterfaceSubinterfaceBridgeTableMacLearningAging
              default: InterfaceSubinterfaceBridgeTableMacLearningAging
            adminState:
              $ref: '#/components/schemas/InterfaceSubinterfaceBridgeTableMacLearningAgingAdminState'
            isPartOf:
              $ref: '#/components/schemas/IsPartOf'
              description: isPartOf Relationship with Entity type InterfaceSubinterfaceBridgeTableMacLearning.
        - required:
          - type
          - isPartOf
    InterfaceSubinterfaceBridgeTableMacLearningAgingAdminState:
      description: |
        Configurable state of the aging for the dynamic mac entries in the bridge table.
        If disabled, dynamically learned mac entries will be programmed in the bridge table
        until the network instance is disabled.
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - enable
                - disable
              default: enable
          required:
            - value
    InterfaceSubinterfaceBridgeTableMacDuplication:
      description: |
        
        YANG module: srl_nokia-interfaces.yang
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Entity'
        - type: object
          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be InterfaceSubinterfaceBridgeTableMacDuplication.
              type: string
              enum:
                - InterfaceSubinterfaceBridgeTableMacDuplication
              default: InterfaceSubinterfaceBridgeTableMacDuplication
            action:
              $ref: '#/components/schemas/InterfaceSubinterfaceBridgeTableMacDuplicationAction'
            isPartOf:
              $ref: '#/components/schemas/IsPartOf'
              description: isPartOf Relationship with Entity type InterfaceSubinterfaceBridgeTable.
        - required:
          - type
          - isPartOf
    InterfaceSubinterfaceBridgeTableMacDuplicationAction:
      description: |
        Action to take on the subinterface upon detecting at least one mac addresses as duplicate
        on the subinterface. In particular:
        - use-net-instance-action: upon detecting a duplicate mac on the subinterface, the action on the subinterface will be
         inherited from the action configured under network-instance/bridge-table/mac-duplication/action.
        - oper-down: if configured, upon detecting a duplicate mac on the subinterface, the subinterface
         will be brought oper-down, with oper-down-reason mac-dup-detected. The duplicate macs on the interface will be kept
         in CPM though, and shown in the duplicate-entries state. In this case, arriving frames on a different subinterface with
         the duplicate mac as source mac are dropped. Arriving frames on a different subinterface with a destination mac
         matching the duplicate mac are dropped.
        - blackhole: upon detecting a duplicate mac on the subinterface, the mac will be blackholed. Any
         frame received on this or any other subinterface with source mac matching a blackhole mac will be discarded. Any frame
         received with destination mac matching the blackhole mac will be discarded, although still processed for source mac
         learning.
        - stop-learning: upon detecting a duplicate mac on the subinterface, existing macs are kept (and refreshed) but new macs
         are no longer learned on this subinterface. The duplicate mac will stay learned on the subinterface. Frames arriving to
         a different subinterface with a source mac matching the duplicate mac will be dropped. Frames arriving to a different
         subinterface with a destination mac matching the duplicate mac will be forwarded normally.
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - use-net-instance-action
                - stop-learning
                - blackhole
                - oper-down
              default: use-net-instance-action
          required:
            - value
    InterfaceSflow:
      description: |
        Context to configure sFlow parameters
        
        YANG module: srl_nokia-interfaces.yang
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Entity'
        - type: object
          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be InterfaceSflow.
              type: string
              enum:
                - InterfaceSflow
              default: InterfaceSflow
            adminState:
              $ref: '#/components/schemas/InterfaceSflowAdminState'
            ingressSamplingRate:
              $ref: '#/components/schemas/IngressSamplingRate'
            egressSamplingRate:
              $ref: '#/components/schemas/EgressSamplingRate'
            isPartOf:
              $ref: '#/components/schemas/IsPartOf'
              description: isPartOf Relationship with Entity type Interface.
        - required:
          - type
          - isPartOf
    InterfaceSflowAdminState:
      description: |
        Administratively enable or disable sFlow on this interface
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - enable
                - disable
          required:
            - value
    IngressSamplingRate:
      description: |
        Specify sFlow Ingress packet sample rate.
        This value is the rate at which traffic will be sampled at a rate of 1:N received packets.
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
              minimum: 0
              maximum: 2000000
          required:
            - value
    EgressSamplingRate:
      description: |
        Specify sFlow Egress packet sample rate.
        This value is the rate at which traffic will be sampled at a rate of 1:N received packets.
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
              minimum: 0
              maximum: 2000000
          required:
            - value
    NetworkInstance:
      description: |
        Network instances configured on the local system
        
        YANG module: srl_nokia-network-instance.yang
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Entity'
        - type: object
          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be NetworkInstance.
              type: string
              enum:
                - NetworkInstance
              default: NetworkInstance
            name:
              $ref: '#/components/schemas/NetworkInstanceName'
            networkinstanceType:
              $ref: '#/components/schemas/NetworkInstanceType'
            adminState:
              $ref: '#/components/schemas/NetworkInstanceAdminState'
            operState:
              $ref: '#/components/schemas/NetworkInstanceOperState'
            operDownReason:
              $ref: '#/components/schemas/NetworkInstanceOperDownReason'
            operMacVrfMtu:
              $ref: '#/components/schemas/OperMacVrfMtu'
            operVpwsMtu:
              $ref: '#/components/schemas/OperVpwsMtu'
            description:
              $ref: '#/components/schemas/NetworkInstanceDescription'
            routerId:
              $ref: '#/components/schemas/NetworkInstanceRouterId'
        - required:
          - type
          - name
    NetworkInstanceName:
      description: |
        A unique name identifying the network instance
        
        YANG module: srl_nokia-network-instance.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              pattern: '[A-Za-z0-9!@#$%^&()|+=`~.,_:;?-][A-Za-z0-9 !@#$%^&()|+=`~.,_:;?-]*'
          required:
            - value
    NetworkInstanceType:
      description: |
        The type of network instance. The value of this leaf
        indicates the type of forwarding entries that should be
        supported by this network instance
        
        YANG module: srl_nokia-network-instance.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              default: default
          required:
            - value
    NetworkInstanceAdminState:
      description: |
        This leaf contains the configured, desired state of the
        network instance.
        
        YANG module: srl_nokia-network-instance.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
