              $ref: '#/components/schemas/SystemLldpInterfaceNeighborBgpAutoDiscoveryGroupId'
            isPartOf:
              $ref: '#/components/schemas/IsPartOf'
              description: isPartOf Relationship with Entity type SystemLldpInterfaceNeighbor.
        - required:
          - type
          - isPartOf
    BgpPeerAddresses:
      description: |
        List of IP address learned from neighbor for BGP auto discovery
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
          required:
            - value
    SystemLldpInterfaceNeighborBgpAutoDiscoveryGroupId:
      description: |
        A four byte integer to send on outgoing LLDPDUs, this value can be used on the remote
        end to do peer group association. This sub-TLV is not sent by default
        
        YANG module: srl_nokia-lldp.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    SystemLldpInterfaceNeighborCustomTlv:
      description: |
        List of custom LLDP TLVs from a neighbor
        
