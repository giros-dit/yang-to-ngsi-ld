    VirtualCircuitType:
      description: |
        The virtual circuit (VC) type of the pseudowire
        
        When set to vlan, the router signals vc-type 'vlan' and pushes
        vlan tag in the inner frame when sending frames over the
        pseudowire.
        
        YANG module: srl_nokia-network-instance.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
