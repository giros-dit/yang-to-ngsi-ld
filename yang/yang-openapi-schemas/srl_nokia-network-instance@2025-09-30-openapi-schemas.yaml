          required:
            - value
    EgressVcLabel:
      description: |
        The value of the configured egress vc label
        
        The egress virtual circuit mpls label is allocated by the
        system when the endpoint signaling is of type TLDP or
        configured in this case since the signaling is static.
        
        YANG module: srl_nokia-network-instance.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    NetworkInstanceConnectionPointPseudowireSignalingSignalingTldp:
      description: |
        Targeted Label Distribution Protocol pseudowire signaling parameters
        
        When the network instance is of type vpws, the use of TLDP is
        specified in RFC4447. When the network instance is of type mac-vrf,
        the use of TLDP is specified in RFC4762.
        
        YANG module: srl_nokia-network-instance.yang
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Entity'
