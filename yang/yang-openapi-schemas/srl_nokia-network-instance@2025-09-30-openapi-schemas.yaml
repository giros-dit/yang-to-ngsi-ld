    NetworkInstanceConnectionPointBridgeTableMacDuplication:
      description: |
        
        YANG module: srl_nokia-network-instance.yang
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Entity'
        - type: object
          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be NetworkInstanceConnectionPointBridgeTableMacDuplication.
              type: string
              enum:
                - NetworkInstanceConnectionPointBridgeTableMacDuplication
              default: NetworkInstanceConnectionPointBridgeTableMacDuplication
            action:
              $ref: '#/components/schemas/NetworkInstanceConnectionPointBridgeTableMacDuplicationAction'
            isPartOf:
              $ref: '#/components/schemas/IsPartOf'
              description: isPartOf Relationship with Entity type NetworkInstanceConnectionPointBridgeTable.
        - required:
          - type
          - isPartOf
    NetworkInstanceConnectionPointBridgeTableMacDuplicationAction:
      description: |
        Action to take on all the subinterfaces or pseudowires of the connection-point upon detecting at least one mac addresses as duplicate
        
        In particular:
        - use-net-instance-action: upon detecting a duplicate mac on the subinterface, the action on the connection-point will be
         inherited from the action configured under network-instance/bridge-table/mac-duplication/action.
        - oper-down: if configured, upon detecting a duplicate mac on the subinterface, the connection-point objects
         will be brought oper-down, with oper-down-reason mac-dup-detected. The duplicate macs on the interface will be kept
         in CPM though, and shown in the duplicate-entries state. In this case, arriving frames on a different subinterface/pw with
         the duplicate mac as source mac are dropped. Arriving frames on a different subinterface/pw with a destination mac
         matching the duplicate mac are dropped.
        - blackhole: upon detecting a duplicate mac on the connection-point, the mac will be blackholed. Any
         frame received on this or any other subinterface with source mac matching a blackhole mac will be discarded. Any frame
         received with destination mac matching the blackhole mac will be discarded, although still processed for source mac
         learning.
        - stop-learning: upon detecting a duplicate mac on the connection-point, existing macs are kept (and refreshed) but new macs
         are no longer learned on this subinterface/pw. The duplicate mac will stay learned on the subinterface/pw. Frames arriving to
         a different subinterface/pw with a source mac matching the duplicate mac will be dropped. Frames arriving to a different
         subinterface/pw with a destination mac matching the duplicate mac will be forwarded normally.
        
        YANG module: srl_nokia-network-instance.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - use-net-instance-action
                - stop-learning
                - blackhole
                - oper-down
              default: use-net-instance-action
          required:
            - value
    NetworkInstanceConnectionPointRedundancy:
      description: |
        
        YANG module: srl_nokia-network-instance.yang
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Entity'
        - type: object
          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be NetworkInstanceConnectionPointRedundancy.
              type: string
              enum:
                - NetworkInstanceConnectionPointRedundancy
              default: NetworkInstanceConnectionPointRedundancy
            revertTime:
              $ref: '#/components/schemas/RevertTime'
            standbySignaling:
              $ref: '#/components/schemas/NetworkInstanceConnectionPointRedundancyStandbySignaling'
            isPartOf:
              $ref: '#/components/schemas/IsPartOf'
              description: isPartOf Relationship with Entity type NetworkInstanceConnectionPoint.
        - required:
          - type
          - isPartOf
    RevertTime:
      description: |
        Time to wait before reverting to primary pseudowire
        
        After the primary pseudowire fails and comes back up, this value determines
        whether the connection-point switches the transmit traffic back to the primary
        pseudowire, and if so, how long the router waits before switching back to
        the primary pseudowire. By default the router switches back to the primary
        pseudowire immediately. When set to 'never' the behavior is non-revertive and
        the router keeps transmitting traffic via the current pseudowire.
        
        YANG module: srl_nokia-network-instance.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              default: immediate
          required:
            - value
    NetworkInstanceConnectionPointRedundancyStandbySignaling:
      description: |
        Pseudowire behavior with respect to the received standby signaling in the T-LDP pseudowire status bits
        
        When set to 'leader' the router:
        - Transmission (Tx): advertises pseudowire-forwarding-standby status bits to T-LDP peers, but only for
         non-primary pseudowires in the connection-point.
        - Reception (Rx): processes traffic on all pseudowires, with no distinction between primary and
         non-primary pseudowires.
        
        When set to 'follower' the router:
        - Transmission (Tx): blocks forwarding when pseudowire-forwarding-standby status bits are received.
        - Reception (Rx): processes traffic on all pseudowires, with no distinction between primary and
         non-primary pseudowires.
        
        YANG module: srl_nokia-network-instance.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - leader
                - follower
              default: follower
          required:
            - value
    NetworkInstanceConnectionPointOperState:
      description: |
        The operational state of this connection-point.
        
        YANG module: srl_nokia-network-instance.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - up
                - down
                - empty
                - downloading
                - booting
                - starting
                - failed
                - synchronizing
                - upgrading
                - low-power
                - degraded
                - warm-reboot
                - waiting
          required:
            - value
    NetworkInstanceConnectionPointOperDownReason:
      description: |
        The reason for the connection-point being down in the network-instance
        
        YANG module: srl_nokia-network-instance.yang
      additionalProperties: false
      allOf:
