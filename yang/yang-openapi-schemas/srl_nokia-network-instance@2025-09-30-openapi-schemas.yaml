        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: boolean
          required:
            - value
    InterfaceSubinterfaceIpv4:
      description: |
        IPv4 configuration and state for the subinterface
        
        YANG module: srl_nokia-interfaces.yang
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Entity'
        - type: object
          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be InterfaceSubinterfaceIpv4.
              type: string
              enum:
                - InterfaceSubinterfaceIpv4
              default: InterfaceSubinterfaceIpv4
            adminState:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv4AdminState'
            allowDirectedBroadcast:
              $ref: '#/components/schemas/AllowDirectedBroadcast'
            isPartOf:
              $ref: '#/components/schemas/IsPartOf'
              description: isPartOf Relationship with Entity type InterfaceSubinterface.
        - required:
          - type
          - isPartOf
    InterfaceSubinterfaceIpv4AdminState:
      description: |
        Enable/disable IPv4 on the subinterface
        
        When set to enable, and even before an IPv4 address is configured, the subinterface starts to accept incoming packets with dest-ip 255.255.255.255, which is necessary to support dhcp-client functionality.
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - enable
                - disable
              default: disable
          required:
            - value
    InterfaceSubinterfaceIpv4Address:
      description: |
        The list of IPv4 addresses assigned to the subinterface.
        
        YANG module: srl_nokia-interfaces.yang
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Entity'
        - type: object
          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be InterfaceSubinterfaceIpv4Address.
              type: string
              enum:
                - InterfaceSubinterfaceIpv4Address
              default: InterfaceSubinterfaceIpv4Address
            ipPrefix:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv4AddressIpPrefix'
            anycastGw:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv4AddressAnycastGw'
            origin:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv4AddressOrigin'
            primary:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv4AddressPrimary'
            status:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv4AddressStatus'
            isPartOf:
              $ref: '#/components/schemas/IsPartOf'
              description: isPartOf Relationship with Entity type InterfaceSubinterfaceIpv4.
        - required:
          - type
          - isPartOf
    InterfaceSubinterfaceIpv4AddressIpPrefix:
      description: |
        The IPv4 address and prefix length in CIDR notation
        
        Subnets on the same subinterface are allowed to overlap as long as the host bits are different. When a locally originated unicast packet is destined to a host covered by multiple subnets associated with a subinterface, the source address is chosen to be the numerically lowest IP address among all these subnets. For example, if the addresses 172.16.1.1/12, 172.16.1.2/12, and 172.16.1.3/12 are configured on the same interface, 172.16.1.1 would be used as a local address when you issue a ping 172.16.1.5 command
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
          required:
            - value
    InterfaceSubinterfaceIpv4AddressAnycastGw:
      description: |
        This designates the associated IPv4 address as an anycast-gateway IPv4 address of the subinterface.
        
        When this parameter is set to true:
        - The IPv4 address is associated with the anycast-gw MAC address in the same subinterface. ARP Requests received for the anycast-gw IPv4 address
         will be replied using this anycast-gw MAC address.
        - The IPv4 address can have duplicate IPv4 addresses in other IRB subinterfaces of routers attached to the same broadcast domain.
         Because of that ARP duplicate-address-detection procedures do not apply to anycast-gw IP addresses.
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: boolean
          required:
            - value
    InterfaceSubinterfaceIpv4AddressOrigin:
      description: |
        The origin of the IPv4 address.
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - other
                - static
                - dhcp
                - link-layer
                - random
          required:
            - value
    InterfaceSubinterfaceIpv4AddressPrimary:
      description: |
        One of the IPv4 prefixes assigned to the subinterface can be explicitly configured as primary by setting this leaf to true. This designates the associated IPv4 address as a primary IPv4 address of the subinterface. By default, the numerically lowest value IPv4 address is selected as the primary address.
        
        The primary address is used as the source address for locally originated broadcast and multicast packets sent out the subinterface.
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
          required:
            - value
    InterfaceSubinterfaceIpv4AddressStatus:
      description: |
        The status of an IPv4 address
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - preferred
                - inaccessible
                - tentative
                - duplicate
          required:
            - value
    AllowDirectedBroadcast:
      description: |
        When this is set to true the software is allowed to re-broadcast targeted broadcast IPv4 packets on this subinterface
        
        Detailed handling of subnet broadcast is as follows:
        
        If a targeted broadcast packet is received on subinterface X that has the matching subnet then it is delivered to the CPM and CPM will reply to an ICMP echo.
        
        If a targeted broadcast packet is received on subinterface X but the matching subnet is associated with subinterface Y, and subinterface Y is configured with allow-directed-broadcasts=false then it is delivered to the CPM and CPM replies to an ICMP echo per above, but it does not re-broadcast the packet on subinterface Y.
        
        If a targeted broadcast packet is received on subinterface X but the matching subnet is associated with subinterface Y, and subinterface Y is configured with allow-directed-broadcasts=true then it is delivered to the CPM and CPM replies to an ICMP echo per above, and CPM also re-broadcasts the packet on subinterface Y.
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: boolean
              default: false
          required:
            - value
    InterfaceSubinterfaceIpv4Unnumbered:
      description: |
        Top-level container for configuring unnumbered interfaces
        
        YANG module: srl_nokia-interfaces.yang
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Entity'
        - type: object
          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be InterfaceSubinterfaceIpv4Unnumbered.
              type: string
              enum:
                - InterfaceSubinterfaceIpv4Unnumbered
              default: InterfaceSubinterfaceIpv4Unnumbered
            adminState:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv4UnnumberedAdminState'
            interface:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv4UnnumberedInterface'
            address:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv4UnnumberedAddress'
            unavailableAddressReason:
              $ref: '#/components/schemas/UnavailableAddressReason'
            isPartOf:
              $ref: '#/components/schemas/IsPartOf'
              description: isPartOf Relationship with Entity type InterfaceSubinterfaceIpv4.
        - required:
          - type
          - isPartOf
    InterfaceSubinterfaceIpv4UnnumberedAdminState:
      description: |
        When enabled, the subinterface should operate in unnumbered mode for IPv4
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - enable
                - disable
              default: disable
          required:
            - value
    InterfaceSubinterfaceIpv4UnnumberedInterface:
      description: |
        Reference to the subinterface with the IPv4 address to be borrowed
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              pattern: '(mgmt0\.0|system0\.0|sync0\.0|lo(0|1[0-9][0-9]|2([0-4][0-9]|5[0-5])|[1-9][0-9]|[1-9])\.(0|[1-9](\d){0,3})|lif-.*\.(0|[1-9](\d){0,3})|vhn-.*\.(0|[1-9](\d){0,3})|enp(0|1[0-9][0-9]|2([0-4][0-9]|5[0-5])|[1-9][0-9]|[1-9])s(0|[1-9]|[1-2][0-9]|3[0-1])f[0-7]\.(0|[1-9](\d){0,3})|ethernet-([1-9](\d){0,1}(/m[1-6])?(/[1-9](\d){0,1})?/(([1-9](\d){0,1})|(1[0-1]\d)|(12[0-8])))\.([0]|[1-9](\d){0,3})|irb(0|1[0-9][0-9]|2([0-4][0-9]|5[0-5])|[1-9][0-9]|[1-9])\.(0|[1-9](\d){0,3})|lag(([1-9](\d){0,2})|(1000))\.(0|[1-9](\d){0,3}))'
          required:
            - value
    InterfaceSubinterfaceIpv4UnnumberedAddress:
      description: |
        The operational IPv4 address borrowed from the referenced subinterface
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
          required:
            - value
    UnavailableAddressReason:
      description: |
        The reason why there is no operational IPv4 address to use for this subinterface
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - not-same-network-instance
                - referenced-interface-is-down
                - referenced-interface-ipv4-is-down
                - referenced-interface-has-no-ipv4-addresses
          required:
            - value
    InterfaceSubinterfaceIpv4Statistics:
      description: |
        Container for subinterface statistics, including all IPv4, IPv6 and MPLS packets belonging to a routed subinterface, or including just one of these protocols on a routed subinterface, or for all frames on a bridged subinterface
        
        YANG module: srl_nokia-interfaces.yang
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Entity'
        - type: object
          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be InterfaceSubinterfaceIpv4Statistics.
              type: string
              enum:
                - InterfaceSubinterfaceIpv4Statistics
              default: InterfaceSubinterfaceIpv4Statistics
            inPackets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv4StatisticsInPackets'
            inOctets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv4StatisticsInOctets'
            inErrorPackets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv4StatisticsInErrorPackets'
            inDiscardedPackets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv4StatisticsInDiscardedPackets'
            inTerminatedPackets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv4StatisticsInTerminatedPackets'
            inTerminatedOctets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv4StatisticsInTerminatedOctets'
            inForwardedPackets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv4StatisticsInForwardedPackets'
            inForwardedOctets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv4StatisticsInForwardedOctets'
            inMatchedRaPackets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv4StatisticsInMatchedRaPackets'
            outForwardedPackets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv4StatisticsOutForwardedPackets'
            outForwardedOctets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv4StatisticsOutForwardedOctets'
            outOriginatedPackets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv4StatisticsOutOriginatedPackets'
            outOriginatedOctets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv4StatisticsOutOriginatedOctets'
            outErrorPackets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv4StatisticsOutErrorPackets'
            outDiscardedPackets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv4StatisticsOutDiscardedPackets'
            outPackets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv4StatisticsOutPackets'
            outOctets:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv4StatisticsOutOctets'
            lastClear:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv4StatisticsLastClear'
            isPartOf:
              $ref: '#/components/schemas/IsPartOf'
              description: isPartOf Relationship with Entity type InterfaceSubinterfaceIpv4.
        - required:
          - type
          - isPartOf
    InterfaceSubinterfaceIpv4StatisticsInPackets:
      description: |
        The total number of input packets received, counting transit and terminating traffic
        
        This equals the sum of:
        in-error-packets
        in-discarded-packets
        in-terminated-packets
        in-forwarded-packets
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceSubinterfaceIpv4StatisticsInOctets:
      description: |
        The total number of octets received in input packets, counting transit and terminating traffic
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceSubinterfaceIpv4StatisticsInErrorPackets:
      description: |
        The total number of input packets discarded due to errors, counting transit and terminating traffic
        
        In an IP context, the sum of the following RFC 4293 counters:
        ipIfStatsInHdrErrors
        ipIfStatsInNoRoutes
        ipIfStatsInAddrErrors
        ipIfStatsInUnknownProtos
        ipIfStatsInTruncatedPkts
        
        In an MPLS context, the total number of MPLS packets that were dropped because:
        - forwarded top label had an MPLS TTL value of 0
        - terminating top label had an MPLS TTL value of 0
        - the top label was unknown (no matching forwarding entry)
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceSubinterfaceIpv4StatisticsInDiscardedPackets:
      description: |
        The total number of input packets that were dropped due to explicit programming
        
        The discards can be due to any of the following reasons
        - ingress interface ACL drop action
        - CPM filter drop action
        - VOQ congestion discards (7250 IXR only)
        - unicast destination MAC address is not the MAC address of the subinterface
        - packet matched a route with a blackhole next-hop
        - packet was non-terminating and its TTL expired
        - packet matched a route with a next-hop via another subinterface but the next-hop address was not resolvable by ARP/ND
        - packet is a host address on another subinterface but the host address was not resolvable by ARP/ND
        
        In an MPLS context, this includes the total number of MPLS packets that were dropped because they were received with forwarded top label having an MPLS TTL value of 1
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceSubinterfaceIpv4StatisticsInTerminatedPackets:
      description: |
        The total number of input packets that were received on this subinterface that were extracted to the control plane
        
        The count includes packets eventually discarded by the CPM. Such discards include:
        - packets with unsupported IP protocol numbers
        - packets destined to TCP/UDP ports that are not open/listening
        - IPv4 packets with any IP options
        - IPv6 packets with any extension headers
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceSubinterfaceIpv4StatisticsInTerminatedOctets:
      description: |
        The total number of octets in packets that were received on this subinterface and counted in in-terminated-packets
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceSubinterfaceIpv4StatisticsInForwardedPackets:
      description: |
        The number of packets received on this subinterface for which the router was not the final destination and for which the router attempted to find a route to forward them to that final destination.
        
        Note that non-terminating IPv4 packets with options and non-terminating IPv6 packets with extension headers are included in this count as are packets that trigger ICMP/ICMPv6 redirect messages.
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceSubinterfaceIpv4StatisticsInForwardedOctets:
      description: |
        The number of octets in packets received on this subinterface counted in in-forwarded-packets
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceSubinterfaceIpv4StatisticsInMatchedRaPackets:
      description: |
        The total number of IPv6 packets matched with applied RA-Guard policy
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceSubinterfaceIpv4StatisticsOutForwardedPackets:
      description: |
        The number of transit packets which the router attempted to forward out this subinterface
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceSubinterfaceIpv4StatisticsOutForwardedOctets:
      description: |
        The number of octets in transit packets which the router attempted to forward out this subinterface
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceSubinterfaceIpv4StatisticsOutOriginatedPackets:
      description: |
        The number of packets which originated on the CPM and which the router attempted to forward out this subinterface
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceSubinterfaceIpv4StatisticsOutOriginatedOctets:
      description: |
        The number of octets in packets which originated on the CPM and which the router attempted to forward out this subinterface
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceSubinterfaceIpv4StatisticsOutErrorPackets:
      description: |
        The number of packets, originating and transit, for which this router was successful in finding a path to their final destination through this subinterface but an error prevented their transmission
        
        On 7250 IXR systems this is incremented when the IPv4 packet size exceeds the IP MTU and fragmentation was not allowed or not supported. It is also incremented when the MPLS packet size exceeds the MPLS MTU of the subinterface.
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceSubinterfaceIpv4StatisticsOutDiscardedPackets:
      description: |
        The total number of packets, originating and transit, that should have been sent out this subinterface but were dropped
        
        This includes IP packets dropped by egress interface ACL drop action.
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceSubinterfaceIpv4StatisticsOutPackets:
      description: |
        The total number of packets that this router supplied to the lower layers for transmission
        
        This equals the sum of:
        out-error-packets
        out-discarded-packets
        out-originated-packets
        out-forwarded-packets
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceSubinterfaceIpv4StatisticsOutOctets:
      description: |
        The total number of octets in packets delivered to the lower layers for transmission
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: integer
          required:
            - value
    InterfaceSubinterfaceIpv4StatisticsLastClear:
      description: |
        Timestamp of the last time the subinterface counters were cleared
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
          required:
            - value
    InterfaceSubinterfaceIpv6:
      description: |
        IPv6 configuration and state for the subinterface
        
        YANG module: srl_nokia-interfaces.yang
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Entity'
        - type: object
          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be InterfaceSubinterfaceIpv6.
              type: string
              enum:
                - InterfaceSubinterfaceIpv6
              default: InterfaceSubinterfaceIpv6
            adminState:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv6AdminState'
            isPartOf:
              $ref: '#/components/schemas/IsPartOf'
              description: isPartOf Relationship with Entity type InterfaceSubinterface.
        - required:
          - type
          - isPartOf
    InterfaceSubinterfaceIpv6AdminState:
      description: |
        Enable/disable IPv6 on the subinterface
        
        When set to enable, and even before a global unicast IPv6 address is configured, chassis manager assigns an IPv6 link-local address to the subinterface, which will appear as a read-only entry in the address list. At this stage, the subinterface can receive IPv6 packets with any of the following destinations:
        -	IPv6 link-local address
        -	solicited-node multicast address for the link-local address
        -	ff02::1 (all IPv6 devices)
        -	ff02::2 (all IPv6 routers)
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - enable
                - disable
              default: disable
          required:
            - value
    InterfaceSubinterfaceIpv6Address:
      description: |
        The list of IPv6 addresses assigned to the subinterface.
        
        YANG module: srl_nokia-interfaces.yang
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Entity'
        - type: object
          properties:
            type:
              description: NGSI-LD Entity identifier. It has to be InterfaceSubinterfaceIpv6Address.
              type: string
              enum:
                - InterfaceSubinterfaceIpv6Address
              default: InterfaceSubinterfaceIpv6Address
            ipPrefix:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv6AddressIpPrefix'
            addressType:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv6AddressType'
            anycastGw:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv6AddressAnycastGw'
            origin:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv6AddressOrigin'
            primary:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv6AddressPrimary'
            status:
              $ref: '#/components/schemas/InterfaceSubinterfaceIpv6AddressStatus'
            isPartOf:
              $ref: '#/components/schemas/IsPartOf'
              description: isPartOf Relationship with Entity type InterfaceSubinterfaceIpv6.
        - required:
          - type
          - isPartOf
    InterfaceSubinterfaceIpv6AddressIpPrefix:
      description: |
        The IPv6 address and prefix-length in CIDR notation
        
        Up to 16 global unicast IPv6 addresses can be assigned to each subinterface. Global unicast IPv6 address subnets on the same subinterface are allowed to overlap as long as the host bits are different. When a locally originated unicast packet is destined to a host covered by multiple subnets associated with a subinterface, the source address is chosen to be the numerically lowest IP address among all these subnets.
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
          required:
            - value
    InterfaceSubinterfaceIpv6AddressType:
      description: |
        Specifies the explicit type of the IPv6 address being assigned to the subinterface
        
        By default, addresses are assumed to be global unicast. Where a link-local address is to be explicitly configured, this leaf should be set to link-local.
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - global-unicast
                - link-local-unicast
              default: global-unicast
          required:
            - value
    InterfaceSubinterfaceIpv6AddressAnycastGw:
      description: |
        This designates the associated IPv6 address as an anycast-gateway IPv6 address of the subinterface.
        
        When this parameter is set to true:
        - The IPv6 address is associated with the anycast-gw MAC address in the same subinterface. Neighbor Solicitations received for the anycast-gw IPv6 address
         will be replied using this anycast-gw MAC address.
        - The IPv6 address can have duplicate IPv6 addresses in other IRB subinterfaces of routers attached to the same broadcast domain.
         Because of that, ND duplicate-address-detection procedures do not apply to anycast-gw IP addresses.
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: boolean
          required:
            - value
    InterfaceSubinterfaceIpv6AddressOrigin:
      description: |
        The origin of the IPv6 address
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
        - type: object
          properties:
            value:
              type: string
              enum:
                - other
                - static
                - dhcp
                - link-layer
                - random
          required:
            - value
    InterfaceSubinterfaceIpv6AddressPrimary:
      description: |
        One of the IPv6 prefixes assigned to the subinterface can be explicitly configured as primary by setting this leaf to true. This designates the associated IPv6 address as a primary IPv6 address of the subinterface. By default, the numerically lowest value IPv6 address is selected as the primary address.
        
        The primary address is used as the source address for locally originated broadcast and multicast packets sent out the subinterface.
        
        YANG module: srl_nokia-interfaces.yang
      additionalProperties: false
      allOf:
