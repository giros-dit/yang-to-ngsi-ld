      description: |
        Monitoring window for detecting duplication on a given mac address.
        A mac is declared as duplicate if it exceeds the num-moves within the monitoring-window.
        
        Units: minutes
        
        YANG module: srl_nokia-network-instance.yang
      additionalProperties: false
      allOf:
        - $ref: 'https://raw.githubusercontent.com/giros-dit/python-ngsi-ld-client/1.6.1/schemas/ngsi-ld-api.yaml#/components/schemas/Property'
