              type: string
              enum:
                - NetworkInstanceBridgeTableMacDuplication
              default: NetworkInstanceBridgeTableMacDuplication
            adminState:
              $ref: '#/components/schemas/NetworkInstanceBridgeTableMacDuplicationAdminState'
            monitoringWindow:
              $ref: '#/components/schemas/MonitoringWindow'
